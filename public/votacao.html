<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Votação Anônima</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 20px; }
.container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
h1 { text-align: center; }
label { display: block; margin-top: 15px; }
select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
#status { margin-top: 15px; padding: 10px; border-radius: 5px; background-color: #eee; }
</style>
</head>
<body>
<div class="container">
  <h1>Votação Anônima</h1>

  <label>Identidade do Eleitor (opcional: gerar nova):</label>
  <textarea id="identityPrivate" rows="3" placeholder="Trapdoor + Nullifier (JSON)"></textarea>
  <button id="btnGenerateIdentity">Gerar Nova Identidade</button>
  <button id="btnRegisterVoter">Registrar IdentityCommitment</button>

  <label>Selecione seu voto:</label>
  <select id="voteOption">
    <option value="A">Opção A</option>
    <option value="B">Opção B</option>
    <option value="C">Opção C</option>
  </select>

  <button id="btnSubmitVote">Enviar Voto</button>

  <div id="status">Status: aguardando ação...</div>
</div>

<script type="module">
import { Identity } from "https://cdn.jsdelivr.net/npm/@semaphore-protocol/identity/dist/identity.min.js";
import { generateProof, packToSolidityProof } from "https://cdn.jsdelivr.net/npm/@semaphore-protocol/proof/dist/proof.min.js";
import { Group } from "https://cdn.jsdelivr.net/npm/@semaphore-protocol/groups/dist/groups.min.js";
import { ethers } from "https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.esm.min.js";

// Configurações do contrato
const contractAddress = "SEU_CONTRACT_ADDRESS_AQUI";
const contractABI = [ /* ABI do SemaphoreVoting */ ];

let identity = null;
let provider, signer, contract;

async function init() {
  if (!window.ethereum) {
    alert("MetaMask não detectado!");
    return;
  }

  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  contract = new ethers.Contract(contractAddress, contractABI, signer);

  document.getElementById("status").innerText = "Status: pronto.";
}

// Gerar nova identidade
document.getElementById("btnGenerateIdentity").addEventListener("click", () => {
  identity = new Identity();
  document.getElementById("identityPrivate").value = JSON.stringify({
    trapdoor: identity.trapdoor.toString(),
    nullifier: identity.nullifier.toString()
  });
  document.getElementById("status").innerText = "Status: nova identidade gerada.";
});

// Registrar identityCommitment
document.getElementById("btnRegisterVoter").addEventListener("click", async () => {
  if (!identity) {
    alert("Gere ou carregue sua identidade primeiro!");
    return;
  }

  const commitment = identity.generateCommitment().toString();
  try {
    const tx = await contract.addVoter(commitment);
    await tx.wait();
    document.getElementById("status").innerText = "Status: identityCommitment registrado!";
  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Erro ao registrar identityCommitment.";
  }
});

// Enviar voto
document.getElementById("btnSubmitVote").addEventListener("click", async () => {
  if (!identity) {
    alert("Gere ou carregue sua identidade primeiro!");
    return;
  }

  const vote = document.getElementById("voteOption").value;

  // Criptografia simples ECIES (ethers + publicKey do admin)
  // Para POC, podemos usar o address do admin como base para ECIES / AES híbrido
  const encoder = new TextEncoder();
  const voteBytes = encoder.encode(vote);
  // Para produção: usar ECIES real, curve secp256k1 / x25519
  const signal = ethers.utils.hexlify(voteBytes);

  // Criar grupo local (POC: incluir apenas você para teste)
  const group = new Group();
  const commitment = identity.generateCommitment();
  group.addMember(commitment);

  const externalNullifier = BigInt(1); // exemplo de ballotId
  const fullProof = await generateProof(identity, group, externalNullifier, signal);
  const solidityProof = packToSolidityProof(fullProof.proof);

  try {
    const merkleRoot = group.root;
    const nullifierHash = fullProof.publicSignals.nullifierHash;

    const tx = await contract.vote(
      merkleRoot,
      signal,
      nullifierHash,
      externalNullifier,
      solidityProof
    );
    await tx.wait();
    document.getElementById("status").innerText = "Voto enviado com sucesso!";
  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Erro ao enviar voto.";
  }
});

init();
</script>
</body>
</html>
